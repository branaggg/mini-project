<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Family Guy University University Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Paste your image link inside the quotes below! */
            background-image: url('https://static0.colliderimages.com/wordpress/wp-content/uploads/2025/03/family-guy-custom-01.jpg?w=1200&h=675&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            overflow: hidden;
        }

        .login-box {
            /* Replace the background line with your GIF link! */
            background-image: url(''); /*removed gif */
            background-size: cover;
            background-position: center;

            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: slideUp 0.6s ease-out forwards;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-top: 0;
            color: white;
            /* Changed to white */
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
            /* Added shadow for readability */
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: white;
            /* Changed to white */
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            /* Added shadow for readability */
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .flash-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Family Guy University Portal</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-msg">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. cnorris" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
