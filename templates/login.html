<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Andres Anthony Rueyman University Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        .login-box { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            width: 350px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            animation: slideUp 0.6s ease-out forwards;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-top: 0; color: #333; font-weight: 800; font-size: 28px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #555; font-weight: 600; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e1e5ee; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        
        button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            width: 100%; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3); }
        button:active { transform: translateY(0); }

        .flash-msg { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Andres Anthony Rueyman Portal</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. cnorris" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
