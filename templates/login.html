<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ACME University Login</title>
    <style>
        body { font-family: sans-serif; background-color: #dbe4f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { text-align: center; width: 400px; }
        .input-group { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .input-group input { padding: 5px; width: 200px; }
        button { background-color: #4a72b8; color: white; padding: 10px 20px; border: none; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ACME University</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: red; margin-bottom: 10px;">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form method="POST" action="/">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
